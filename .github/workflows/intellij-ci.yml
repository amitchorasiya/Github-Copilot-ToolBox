# Build the JetBrains plugin: export hub HTML from VS Code sources, then Gradle buildPlugin.
name: IntelliJ plugin CI

on:
  push:
    paths:
      - "packages/github-copilot-toolbox-intellij/**"
      - "packages/github-copilot-toolbox/src/webview/**"
      - "packages/github-copilot-toolbox/scripts/export-hub-for-intellij.mjs"
      - "packages/github-copilot-toolbox/package.json"
      - ".github/workflows/intellij-ci.yml"
  pull_request:
    paths:
      - "packages/github-copilot-toolbox-intellij/**"
      - "packages/github-copilot-toolbox/src/webview/**"
      - "packages/github-copilot-toolbox/scripts/export-hub-for-intellij.mjs"
      - "packages/github-copilot-toolbox/package.json"
      - ".github/workflows/intellij-ci.yml"

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install extension deps, compile, export hub for IntelliJ
        working-directory: packages/github-copilot-toolbox
        run: |
          npm ci
          npm run compile
          npm run export:hub-for-intellij

      - name: Gradle buildPlugin
        working-directory: packages/github-copilot-toolbox-intellij
        run: chmod +x ./gradlew && ./gradlew buildPlugin --no-daemon --stacktrace
