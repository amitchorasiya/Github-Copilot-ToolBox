# Compile + unit tests (Vitest) for the VS Code extension on all major OSes.
name: Extension CI

on:
  push:
    paths:
      - "packages/github-copilot-toolbox/**"
      - "package.json"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "packages/github-copilot-toolbox/**"
      - "package.json"
      - ".github/workflows/extension-ci.yml"

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/github-copilot-toolbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Unit tests (Vitest)
        run: npm test

      - name: Verify extension entrypoint exists
        run: node -e "require('fs').accessSync('out/extension.js')"
